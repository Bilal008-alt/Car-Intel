{% extends 'base.html' %}
{% block content %}
<div class="card-premium" style="max-width: 450px; margin: 40px auto;">
    <div style="text-align: center; margin-bottom: 25px;">
        <h3 style="font-size: 1.75rem; color: #0f172a; font-weight: 700;">Create Account</h3>
        <p style="color: #64748b; font-size: 0.85rem;">Register to start managing car records</p>
    </div>

    <form method="POST" autocomplete="off">
        {% csrf_token %}
        {% for field in form %}
            <div style="margin-bottom: 15px;">
                <label style="font-size: 0.85rem; font-weight: 600; color: #475569;">{{ field.label }}</label>
                {{ field }}
            </div>
        {% endfor %}
        <button type="submit" class="btn-action" style="width: 100%; margin-top: 10px; padding: 12px;">Complete Registration ✓</button>
    </form>

    <div style="text-align: center; margin-top: 20px; font-size: 0.85rem; color: #64748b;">
        Already registered? <a href="{% url 'login' %}" style="color: #10b981; font-weight: 700; text-decoration: none;">Sign In</a>
    </div>
</div>
{% endblock %}
